<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moksedul Hub</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#121212;
color:white;
padding:20px;
transition:0.3s;
}

body.light{
background:#f5f5f5;
color:#111;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.toggle{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
}

.search-box{
display:flex;
gap:10px;
margin-bottom:20px;
}

.search-box input{
flex:1;
padding:12px;
border:none;
border-radius:12px;
font-size:16px;
}

.search-box button{
padding:12px;
border:none;
border-radius:12px;
cursor:pointer;
}

.section{
margin-top:25px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:12px;
margin-top:10px;
}

.card{
background:#1f1f1f;
padding:20px;
border-radius:16px;
text-align:center;
cursor:pointer;
transition:0.2s;
}

body.light .card{
background:white;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.card:hover{
transform:scale(1.05);
}

.card a{
text-decoration:none;
color:inherit;
font-weight:bold;
}

.weather{
background:#2196f3;
padding:20px;
border-radius:15px;
margin-top:20px;
text-align:center;
}

.footer{
margin-top:30px;
text-align:center;
opacity:0.7;
}
</style>
</head>
<body>

<div class="header">
<h2>Moksedul Hub</h2>
<button class="toggle" onclick="toggleMode()">🌙 Mode</button>
</div>

<div class="search-box">
<input type="text" id="query" placeholder="Search anything...">
<button onclick="googleSearch()">Google</button>
</div>

<div class="section">
<h3>Quick Search</h3>

<div class="cards">

<div class="card">
<a href="https://www.google.com" target="_blank">
Google
</a>
</div>

<div class="card">
<a href="https://search.brave.com" target="_blank">
Brave
</a>
</div>

<div class="card">
<a href="https://www.youtube.com" target="_blank">
YouTube
</a>
</div>

<div class="card">
<a href="https://www.wikipedia.org" target="_blank">
Wikipedia
</a>
</div>

</div>
</div>

<div class="section">
<h3>AI Tools</h3>

<div class="cards">

<div class="card">
<a href="https://chatgpt.com" target="_blank">
ChatGPT
</a>
</div>

<div class="card">
<a href="https://gemini.google.com" target="_blank">
Gemini
</a>
</div>

<div class="card">
<a href="https://grok.com" target="_blank">
Grok
</a>
</div>

<div class="card">
<a href="https://www.deepseek.com" target="_blank">
DeepSeek
</a>
</div>

</div>
</div>

<div class="weather">
<h3>Weather</h3>
<p>Tap below</p>
<br>
<a href="https://www.google.com/search?q=weather"
style="color:white;font-weight:bold;">
Check Weather
</a>
</div>

<div class="footer">
<p>Moksedul Hub © 2026</p>
</div>

<script>

function googleSearch(){
let q=document.getElementById("query").value;

if(q.trim()!==""){
window.open(
"https://www.google.com/search?q="+encodeURIComponent(q),
"_blank"
);
}
}

function toggleMode(){
document.body.classList.toggle("light");
}

</script>

</body>
</html>
